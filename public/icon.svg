<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8d6844"/>
      <stop offset="100%" stop-color="#5c3d1e"/>
    </linearGradient>
    <linearGradient id="docgrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5ead8"/>
    </linearGradient>
    <clipPath id="doc-clip">
      <rect x="144" y="100" width="224" height="304" rx="18"/>
    </clipPath>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Document shadow -->
  <rect x="150" y="108" width="224" height="304" rx="18" fill="rgba(0,0,0,0.15)"/>

  <!-- Document body -->
  <rect x="144" y="100" width="224" height="304" rx="18" fill="url(#docgrad)"/>

  <!-- Page fold (top-right corner) clipped to document -->
  <g clip-path="url(#doc-clip)">
    <polygon points="304,100 368,164 304,164" fill="#ddc9a8"/>
    <polygon points="304,100 368,100 368,164" fill="#ecddc2"/>
  </g>

  <!-- Euro symbol — main focal point -->
  <text x="224" y="218"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="86" font-weight="800"
        fill="#7a5c3a" opacity="0.92">€</text>

  <!-- Form field lines -->
  <rect x="176" y="250" width="72" height="9" rx="4.5" fill="#c8ae90"/>
  <rect x="258" y="250" width="86" height="9" rx="4.5" fill="#dcc9a8"/>

  <rect x="176" y="276" width="168" height="9" rx="4.5" fill="#c8ae90"/>

  <rect x="176" y="302" width="126" height="9" rx="4.5" fill="#dcc9a8"/>
  <rect x="176" y="328" width="152" height="9" rx="4.5" fill="#c8ae90"/>

  <!-- Divider -->
  <rect x="176" y="352" width="168" height="2" rx="1" fill="#c8ae90"/>

  <!-- Total row: label + green amount -->
  <rect x="176" y="368" width="78" height="10" rx="5" fill="#a08060"/>
  <rect x="286" y="368" width="58" height="10" rx="5" fill="#4d8a52"/>
</svg>
